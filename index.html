<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F4EF; --panel:#FFFFFF; --ink:#20242B; --ink2:#5C636E;
  --line:#E4E2D9; --press:#274690; --press-soft:#E7ECF7;
  --mark:#FFD84D; --mark-ink:#6B5400; --plan:#B9C0CA;
  --danger:#B4372E; --ok:#2E7D4F;
  --radius:10px;
  --disp:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45}
button{font-family:var(--body);cursor:pointer}
input,textarea,select{font-family:var(--body);font-size:14px;color:var(--ink)}
:focus-visible{outline:2px solid var(--press);outline-offset:2px}

/* ---------- shell ---------- */
.topbar{display:flex;align-items:baseline;gap:14px;padding:18px 20px 0}
.brand{font-family:var(--disp);font-weight:800;font-size:22px;letter-spacing:-.02em}
.brand .tick{color:var(--press)}
.tagline{color:var(--ink2);font-size:12px}
.savestate{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink2)}
.tabs{display:flex;gap:4px;padding:12px 20px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{background:none;border:none;border-bottom:3px solid transparent;padding:8px 12px 10px;font-size:14px;font-weight:600;color:var(--ink2)}
.tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--mark)}
.tab .cnt{font-family:var(--mono);font-size:11px;color:var(--ink2);margin-left:4px}
main{padding:18px 20px 60px;max-width:1400px}
.loading{padding:60px 20px;color:var(--ink2);font-family:var(--mono);font-size:12px}

/* ---------- shared bits ---------- */
.toolrow{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:180px;max-width:360px;padding:8px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.btn{border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);padding:8px 12px;font-weight:600;font-size:13px}
.btn:hover{border-color:var(--press);color:var(--press)}
.btn.primary{background:var(--press);border-color:var(--press);color:#fff}
.btn.primary:hover{filter:brightness(1.1);color:#fff}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink2)}
.btn.ghost:hover{color:var(--danger)}
.chip{border:1px solid var(--line);background:var(--panel);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--ink2)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.empty{padding:30px;border:1px dashed var(--line);border-radius:var(--radius);color:var(--ink2);text-align:center}

/* ---------- matrix ---------- */
.matrix-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);max-height:76vh}
table.matrix{border-collapse:separate;border-spacing:0;font-size:13px}
.matrix th,.matrix td{border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.matrix thead th{position:sticky;top:0;background:var(--panel);z-index:3;vertical-align:bottom;height:150px;padding:0}
.matrix thead th:first-child{z-index:4}
.colhead{display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;width:46px;padding-bottom:8px;gap:6px}
.colhead .nm{writing-mode:vertical-rl;transform:rotate(180deg);max-height:104px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:12px;cursor:pointer}
.colhead .nm:hover{color:var(--press)}
.pbar{width:26px;height:5px;border-radius:3px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--mark)}
.pnum{font-family:var(--mono);font-size:10px;color:var(--ink2)}
.matrix .rowlab{position:sticky;left:0;background:var(--panel);z-index:2;text-align:left;font-weight:500;padding:7px 12px;min-width:180px;max-width:230px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.matrix tr.grp td{background:var(--paper);font-family:var(--disp);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);padding:8px 12px;position:sticky;left:0}
.cell{width:46px;height:34px;text-align:center;padding:0;cursor:pointer;user-select:none;position:relative}
.cell:hover{background:var(--press-soft)}
.cell .swipe{display:inline-block;width:26px;height:16px;border-radius:5px;transform:rotate(-3deg)}
.cell.s2 .swipe{background:var(--mark);box-shadow:0 0 0 1px rgba(107,84,0,.15) inset}
.cell.s2 .swipe::after{content:"✓";display:block;font-size:12px;font-weight:700;color:var(--mark-ink);line-height:16px}
.cell.s1 .swipe{border:2px dashed var(--plan)}
.legend{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--ink2);align-items:center;flex-wrap:wrap}
.legend .swipe{display:inline-block;width:22px;height:13px;border-radius:4px;transform:rotate(-3deg);vertical-align:-2px;margin-right:5px}
.legend .done{background:var(--mark)}
.legend .plan{border:2px dashed var(--plan)}

/* project drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(32,36,43,.35);z-index:20;display:flex;justify-content:flex-end}
.drawer{background:var(--panel);width:min(440px,92vw);height:100%;padding:22px;overflow:auto;box-shadow:-8px 0 30px rgba(0,0,0,.12)}
.drawer h2{font-family:var(--disp);font-weight:800;margin:0 0 4px;font-size:20px}
.drawer .sub{font-family:var(--mono);font-size:11px;color:var(--ink2);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:5px}
.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff}
.field textarea{min-height:70px;resize:vertical}
.drawer .actions{display:flex;gap:8px;margin-top:18px}

/* ---------- ideas ---------- */
.idea-add{display:flex;gap:8px;margin-bottom:14px}
.idea-add input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.idea{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px}
.idea.done .nm{text-decoration:line-through;color:var(--ink2)}
.idea .pri{border:none;border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 7px;min-width:44px;text-align:center}
.pri.p-top{background:var(--danger);color:#fff}
.pri.p-high{background:var(--press);color:#fff}
.pri.p-med{background:var(--press-soft);color:var(--press)}
.pri.p-star{background:var(--mark);color:var(--mark-ink)}
.pri.p-{background:var(--paper);color:var(--ink2);border:1px solid var(--line)}
.idea .nm{flex:1;border:none;background:transparent;font-size:14px;padding:2px}
.idea .note-btn{border:none;background:none;font-size:12px;color:var(--ink2)}
.idea .note-btn.has{color:var(--press);font-weight:700}
.idea input[type=checkbox]{width:17px;height:17px;accent-color:var(--press)}
.idea .del{border:none;background:none;color:var(--ink2);font-size:15px;padding:2px 6px}
.idea .del:hover{color:var(--danger)}
.idea-note{margin:-2px 0 8px 66px}
.idea-note textarea{width:100%;max-width:640px;border:1px solid var(--line);border-radius:8px;padding:8px;min-height:56px}

/* ---------- weekly ---------- */
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.wcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.wcard h3{font-family:var(--disp);font-weight:800;font-size:16px;margin:0 0 12px}
.gcard{background:var(--ink);color:#fff;border-radius:var(--radius);padding:16px}
.gcard h3{font-family:var(--disp);font-weight:800;font-size:15px;margin:0 0 10px;color:var(--mark)}
.gcard ul{margin:0;padding-left:18px;font-size:13px;line-height:1.7}
.gcard b{color:var(--mark)}

/* ---------- genies ---------- */
.gen-cat{margin-bottom:20px}
.gen-cat h3{font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.02em;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.gen-cat h3 .n{font-family:var(--mono);font-size:10px;color:var(--ink2);font-weight:500}
.gen-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px}
.glink{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:9px 12px;text-decoration:none;color:var(--ink);font-size:13px;font-weight:500}
.glink:hover{border-color:var(--press);color:var(--press)}
.glink .arrow{margin-left:auto;color:var(--ink2);font-family:var(--mono);font-size:11px}
.glink .del{border:none;background:none;color:var(--ink2);padding:0 2px}
.glink .del:hover{color:var(--danger)}

@media (max-width:640px){
  main{padding:14px 10px 60px}
  .topbar{padding:14px 12px 0}
  .tabs{padding:8px 8px 0}
  .matrix .rowlab{min-width:130px;max-width:150px;font-size:12px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }
</style>
</head>

/* =============== GitHub Gist storage =============== */
const GIST_DATA_FILENAME = 'production_board_data.json';
let CFG = {token:'', gistId:''};

function loadCfg(){
  try{ const c=localStorage.getItem('pb_cfg'); if(c) CFG=JSON.parse(c); } catch(e){}
}
function saveCfg(){ localStorage.setItem('pb_cfg', JSON.stringify(CFG)); }
function setSaveState(t){ document.getElementById('saveState').textContent=t; }
function isConfigured(){ return CFG.token && CFG.gistId; }

async function gistGet(){
  const r = await fetch(`https://api.github.com/gists/${CFG.gistId}`,
    {headers:{'Authorization':`token ${CFG.token}`,'Accept':'application/vnd.github+json'}});
  if(!r.ok) throw new Error(`Gist fetch failed: ${r.status}`);
  const data = await r.json();
  const raw = data.files?.[GIST_DATA_FILENAME]?.content;
  if(!raw) return null;
  return JSON.parse(raw);
}

async function gistSet(allData){
  const r = await fetch(`https://api.github.com/gists/${CFG.gistId}`,{
    method:'PATCH',
    headers:{'Authorization':`token ${CFG.token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body: JSON.stringify({files:{[GIST_DATA_FILENAME]:{content:JSON.stringify(allData)}}})
  });
  if(!r.ok) throw new Error(`Gist save failed: ${r.status}`);
}

// In-memory fallback while not configured
const mem = {};
let pendingSave = null;

async function loadAllFromGist(){
  if(!isConfigured()) return null;
  return await gistGet();
}

function saveKey(key, val){
  mem[key] = val;
  setSaveState('saving…');
  clearTimeout(pendingSave);
  pendingSave = setTimeout(async ()=>{
    if(!isConfigured()){ setSaveState('⚠ not saved — add token & Gist ID in ⚙ Settings'); return; }
    try{
      await gistSet({projects:S.projects, ideas:S.ideas, plan:S.plan, genies:S.genies});
      setSaveState('✓ saved to Gist  ' + new Date().toLocaleTimeString());
    } catch(e){
      setSaveState('✗ save error — check Settings'); console.error(e);
    }
  }, 800);
}

/* settings panel */
function openSettings(){
  const existing = document.getElementById('settingsBg');
  if(existing){ existing.remove(); return; }
  const d = document.createElement('div');
  d.id='settingsBg';
  d.style.cssText='position:fixed;inset:0;background:rgba(32,36,43,.45);z-index:30;display:flex;align-items:center;justify-content:center';
  d.innerHTML=`<div style="background:#fff;border-radius:12px;padding:26px;width:min(480px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.18)">
    <h2 style="font-family:var(--disp);font-weight:800;margin:0 0 6px">⚙ GitHub Gist Settings</h2>
    <p style="font-size:13px;color:var(--ink2);margin:0 0 18px">Your data is stored in a private GitHub Gist. Set this up once per browser.</p>
    <div style="margin-bottom:12px"><label style="display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:5px">Personal Access Token</label>
    <input id="cfg_token" type="password" value="${CFG.token}" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px"></div>
    <div style="margin-bottom:18px"><label style="display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:5px">Gist ID</label>
    <input id="cfg_gist" value="${CFG.gistId}" placeholder="a1b2c3d4e5f6..." style="width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button id="cfgSave" style="background:var(--press);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer">Save & connect</button>
      <button id="cfgTest" style="background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer">Test connection</button>
      <button id="cfgClose" style="background:none;border:none;color:var(--ink2);padding:10px;cursor:pointer;margin-left:auto">Cancel</button>
    </div>
    <div id="cfgMsg" style="margin-top:12px;font-size:13px"></div>
  </div>`;
  document.body.appendChild(d);
  d.querySelector('#cfgClose').onclick = ()=>d.remove();
  d.onclick = e=>{ if(e.target===d) d.remove(); };
  d.querySelector('#cfgSave').onclick = async ()=>{
    CFG.token = d.querySelector('#cfg_token').value.trim();
    CFG.gistId = d.querySelector('#cfg_gist').value.trim();
    saveCfg();
    d.querySelector('#cfgMsg').textContent='Saved. Testing connection…';
    await testConnection(d);
  };
  d.querySelector('#cfgTest').onclick = async ()=>{ await testConnection(d); };
}

async function testConnection(d){
  const msg = d.querySelector('#cfgMsg');
  try{
    const r = await fetch(`https://api.github.com/gists/${CFG.gistId}`,
      {headers:{'Authorization':`token ${CFG.token}`}});
    if(r.ok){ msg.style.color='var(--ok)'; msg.textContent='✓ Connected! Reloading data…'; setTimeout(()=>{d.remove(); location.reload();},1200); }
    else{ msg.style.color='var(--danger)'; msg.textContent=`✗ Error ${r.status} — check your token and Gist ID`; }
  } catch(e){ msg.style.color='var(--danger)'; msg.textContent='✗ Network error — check your token and try again'; }
}

const $ = s=>document.querySelector(s);

const TABS = [
  {id:'projects', label:'Production Grid', count:()=>S.projects.length},
  {id:'ideas', label:'Book & Ideas', count:()=>S.ideas.filter(i=>!i.done).length},
  {id:'plan', label:'Next Big Action', count:()=>null},
  {id:'genies', label:'Genies', count:()=>S.genies.reduce((a,c)=>a+c.links.length,0)}
];

function renderTabs(){
  $('#tabs').innerHTML = TABS.map(t=>{
    const c=t.count(); 
    return `<button class="tab" role="tab" aria-selected="${activeTab===t.id}" data-tab="${t.id}">${t.label}${c!=null?`<span class="cnt">${c}</span>`:''}</button>`;
  }).join('');
  $('#tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab; render();});
}

function render(){
  renderTabs();
  const m = $('#main');
  if(activeTab==='projects') renderMatrix(m);
  else if(activeTab==='ideas') renderIdeas(m);
  else if(activeTab==='plan') renderPlan(m);
  else renderGenies(m);
}

/* ---- production grid ---- */
function renderMatrix(m){
  const projs = S.projects;
  let head = `<th class="rowlab" style="height:150px;vertical-align:bottom;padding-bottom:8px">Deliverable</th>` +
    projs.map((p,i)=>{
      const total = ALL_ROWS.length;
      const done = ALL_ROWS.filter(r=>p.cells[r]===2).length;
      const pct = Math.round(done/total*100);
      return `<th><div class="colhead"><span class="nm" data-open="${i}" title="${esc(p.name)} — click for details">${esc(p.name)}</span><span class="pbar"><i style="width:${pct}%"></i></span><span class="pnum">${done}</span></div></th>`;
    }).join('');
  let body='';
  for(const g of GROUPS){
    body += `<tr class="grp"><td colspan="${projs.length+1}">${esc(g.name)}</td></tr>`;
    for(const row of g.rows){
      body += `<tr><td class="rowlab" title="${esc(row)}">${esc(row)}</td>` +
        projs.map((p,i)=>{
          const s = p.cells[row]||0;
          return `<td class="cell s${s}" data-p="${i}" data-r="${esc(row)}" role="button" tabindex="0" aria-label="${esc(p.name)} — ${esc(row)}: ${s===2?'done':s===1?'planned':'not started'}"><span class="swipe"></span></td>`;
        }).join('') + `</tr>`;
    }
  }
  m.innerHTML = `
    <div class="toolrow">
      <button class="btn primary" id="addProj">＋ Add project</button>
      <div class="legend">
        <span><span class="swipe done"></span>done</span>
        <span><span class="swipe plan"></span>planned</span>
        <span>Click a cell to cycle · click a project name to edit details</span>
      </div>
    </div>
    <div class="matrix-wrap"><table class="matrix"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
    ${drawerIdx!=null?renderDrawer():''}`;

  m.querySelectorAll('.cell').forEach(c=>{
    const act = ()=>{
      const p=S.projects[+c.dataset.p], r=c.dataset.r;
      p.cells[r]=((p.cells[r]||0)+1)%3;
      saveKey(KEYS.projects,S.projects); render();
    };
    c.onclick=act;
    c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}};
  });
  m.querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>{drawerIdx=+n.dataset.open; render();});
  $('#addProj').onclick=()=>{
    const name=prompt('Project / book / product name:');
    if(!name||!name.trim())return;
    S.projects.push({id:uid(),name:name.trim(),notes:'',purpose:'',goal:'',cta:'',cells:Object.fromEntries(ALL_ROWS.map(r=>[r,0]))});
    saveKey(KEYS.projects,S.projects); render();
  };
  if(drawerIdx!=null) wireDrawer();
}

function renderDrawer(){
  const p=S.projects[drawerIdx];
  if(!p){drawerIdx=null;return '';}
  const f=(id,label,val,ta)=>`<div class="field"><label for="${id}">${label}</label>${ta?`<textarea id="${id}">${esc(val)}</textarea>`:`<input id="${id}" value="${esc(val)}">`}</div>`;
  return `<div class="drawer-bg" id="drawerBg"><div class="drawer" role="dialog" aria-label="Project details">
    <h2>${esc(p.name)}</h2>
    <div class="sub">${ALL_ROWS.filter(r=>p.cells[r]===2).length} of ${ALL_ROWS.length} deliverables done</div>
    ${f('d_name','Name',p.name)}
    ${f('d_purpose','Purpose — what is this for?',p.purpose,true)}
    ${f('d_goal','Goal / result wanted',p.goal,true)}
    ${f('d_cta','Call to action',p.cta)}
    ${f('d_notes','Notes',p.notes,true)}
    <div class="actions">
      <button class="btn primary" id="dSave">Save & close</button>
      <button class="btn" id="dClose">Close</button>
      <button class="btn ghost" id="dDel" style="margin-left:auto">Delete project</button>
    </div>
  </div></div>`;
}
function wireDrawer(){
  const p=S.projects[drawerIdx];
  const close=()=>{drawerIdx=null;render();};
  $('#drawerBg').onclick=e=>{if(e.target.id==='drawerBg')close();};
  $('#dClose').onclick=close;
  $('#dSave').onclick=()=>{
    p.name=$('#d_name').value.trim()||p.name;
    p.purpose=$('#d_purpose').value; p.goal=$('#d_goal').value;
    p.cta=$('#d_cta').value; p.notes=$('#d_notes').value;
    saveKey(KEYS.projects,S.projects); close();
  };
  $('#dDel').onclick=()=>{
    if(confirm(`Delete "${p.name}" and its checklist? This can't be undone.`)){
      S.projects.splice(drawerIdx,1); saveKey(KEYS.projects,S.projects); close();
    }
  };
}

/* ---- ideas ---- */
const PRI_ORDER={top:0,high:1,med:2,star:3,'':4};
const PRI_LABEL={top:'TOP',high:'HIGH',med:'MED',star:'★',' ':'—','':'—'};
function renderIdeas(m){
  const {q,pri,showDone}=ideaFilter;
  let list=S.ideas.filter(i=>(showDone||!i.done)
    && (pri==='all'||i.pri===pri)
    && (!q || i.name.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q)));
  list.sort((a,b)=>(PRI_ORDER[a.pri]??4)-(PRI_ORDER[b.pri]??4));
  const chips=[['all','All'],['top','Top'],['high','High'],['med','Med'],['star','★ Starred'],['','Unranked']];
  m.innerHTML=`
    <div class="idea-add"><input id="newIdea" placeholder="Capture a new book / content idea and press Enter…"><button class="btn primary" id="addIdea">Add</button></div>
    <div class="toolrow">
      <input class="search" id="ideaQ" placeholder="Search ${S.ideas.length} ideas…" value="${esc(q)}">
      ${chips.map(([v,l])=>`<button class="chip ${pri===v?'on':''}" data-pri="${v}">${l}</button>`).join('')}
      <button class="chip ${showDone?'on':''}" id="toggleDone">Show done</button>
    </div>
    <div>${list.length?list.map(i=>`
      <div class="idea ${i.done?'done':''}">
        <button class="pri p-${i.pri}" data-cycle="${i.id}" title="Click to change priority">${PRI_LABEL[i.pri]??'—'}</button>
        <input class="nm" data-nm="${i.id}" value="${esc(i.name)}">
        <button class="note-btn ${i.notes?'has':''}" data-note="${i.id}" title="Notes">✎</button>
        <input type="checkbox" data-done="${i.id}" ${i.done?'checked':''} title="Mark done">
        <button class="del" data-del="${i.id}" title="Delete">×</button>
      </div>
      ${openNoteId===i.id?`<div class="idea-note"><textarea data-notetext="${i.id}" placeholder="Notes…">${esc(i.notes)}</textarea></div>`:''}
    `).join(''):'<div class="empty">No ideas match. Try clearing the search or filters.</div>'}</div>`;

  const byId=id=>S.ideas.find(x=>x.id===id);
  const addFn=()=>{
    const v=$('#newIdea').value.trim(); if(!v)return;
    S.ideas.unshift({id:uid(),pri:'',name:v,notes:'',done:false});
    saveKey(KEYS.ideas,S.ideas); render();
    setTimeout(()=>$('#newIdea')?.focus(),0);
  };
  $('#addIdea').onclick=addFn;
  $('#newIdea').onkeydown=e=>{if(e.key==='Enter')addFn();};
  $('#ideaQ').oninput=e=>{ideaFilter.q=e.target.value.toLowerCase(); renderIdeasListOnly(m);};
  m.querySelectorAll('[data-pri]').forEach(c=>c.onclick=()=>{ideaFilter.pri=c.dataset.pri;render();});
  $('#toggleDone').onclick=()=>{ideaFilter.showDone=!ideaFilter.showDone;render();};
  wireIdeaRows(m,byId);
}
function renderIdeasListOnly(m){ // keep focus in search while typing
  const scroll=window.scrollY; renderIdeas(m);
  const q=$('#ideaQ'); q.focus(); q.setSelectionRange(q.value.length,q.value.length);
  window.scrollTo(0,scroll);
}
function wireIdeaRows(m,byId){
  m.querySelectorAll('[data-cycle]').forEach(b=>b.onclick=()=>{
    const i=byId(b.dataset.cycle); const seq=['','top','high','med','star'];
    i.pri=seq[(seq.indexOf(i.pri)+1)%seq.length];
    saveKey(KEYS.ideas,S.ideas); render();
  });
  m.querySelectorAll('[data-nm]').forEach(inp=>inp.onchange=()=>{
    byId(inp.dataset.nm).name=inp.value; saveKey(KEYS.ideas,S.ideas);
  });
  m.querySelectorAll('[data-done]').forEach(cb=>cb.onchange=()=>{
    byId(cb.dataset.done).done=cb.checked; saveKey(KEYS.ideas,S.ideas); render();
  });
  m.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const i=byId(b.dataset.del);
    if(confirm(`Delete idea "${i.name}"?`)){ S.ideas=S.ideas.filter(x=>x.id!==i.id); saveKey(KEYS.ideas,S.ideas); render(); }
  });
  m.querySelectorAll('[data-note]').forEach(b=>b.onclick=()=>{
    openNoteId = openNoteId===b.dataset.note?null:b.dataset.note; render();
  });
  m.querySelectorAll('[data-notetext]').forEach(t=>t.oninput=()=>{
    byId(t.dataset.notetext).notes=t.value; saveKey(KEYS.ideas,S.ideas);
    m.querySelector(`[data-note="${t.dataset.notetext}"]`)?.classList.toggle('has',!!t.value);
  });
}

/* ---- weekly plan ---- */
const PLAN_FIELDS=[['where','Where am I now'],['action','Next big action'],['result','Next big result'],['week','My actions this week'],['obstacles','Obstacles'],['support','Support needed — from whom / where']];
function renderPlan(m){
  m.innerHTML=`
    <div class="week-grid">
      <div class="gcard">
        <h3>Is it a Good Action?</h3>
        <ul>
          <li><b>Non-emotional</b> — measurable, not a mood</li>
          <li><b>Controllable</b> — I am the cause</li>
          <li><b>Doable</b> — done / not done</li>
          <li><b>Meaningful</b> — not B.S.</li>
          <li><b>Compoundable</b> — exponential growth</li>
          <li><b>Scalable</b> — it works: go big</li>
        </ul>
      </div>
      ${S.projects.map(p=>{
        const d=S.plan[p.id]||{};
        return `<div class="wcard"><h3>${esc(p.name)}</h3>
          ${PLAN_FIELDS.map(([k,l])=>`<div class="field"><label>${l}</label><textarea data-plan="${p.id}" data-f="${k}" rows="2">${esc(d[k]||'')}</textarea></div>`).join('')}
        </div>`;
      }).join('')}
    </div>`;
  m.querySelectorAll('[data-plan]').forEach(t=>t.oninput=()=>{
    const id=t.dataset.plan; S.plan[id]=S.plan[id]||{}; S.plan[id][t.dataset.f]=t.value;
    saveKey(KEYS.plan,S.plan);
  });
}

/* ---- genies ---- */
function renderGenies(m){
  const q=genieQ.toLowerCase();
  m.innerHTML=`
    <div class="toolrow">
      <input class="search" id="genQ" placeholder="Search genies…" value="${esc(genieQ)}">
      <button class="btn primary" id="addGen">＋ Add link</button>
    </div>
    ${S.genies.map((c,ci)=>{
      const links=c.links.filter(l=>!q||l.t.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q));
      if(!links.length)return '';
      return `<div class="gen-cat"><h3>${esc(c.cat)} <span class="n">${links.length}</span></h3>
        <div class="gen-links">${links.map(l=>`
          <a class="glink" href="${esc(l.u)}" target="_blank" rel="noopener">
            <span>${esc(l.t)}</span><span class="arrow">↗</span>
            <button class="del" data-gdel="${ci}:${l.id}" title="Remove link">×</button>
          </a>`).join('')}</div></div>`;
    }).join('')||'<div class="empty">No genies match that search.</div>'}`;
  $('#genQ').oninput=e=>{genieQ=e.target.value; const s=window.scrollY; renderGenies(m); const i=$('#genQ'); i.focus(); i.setSelectionRange(i.value.length,i.value.length); window.scrollTo(0,s);};
  $('#addGen').onclick=()=>{
    const t=prompt('Link name:'); if(!t)return;
    const u=prompt('URL:'); if(!u)return;
    const cat=prompt('Category (existing or new):','Book'); if(!cat)return;
    let c=S.genies.find(x=>x.cat.toLowerCase()===cat.toLowerCase());
    if(!c){c={cat,links:[]};S.genies.push(c);}
    c.links.push({id:uid(),t,u});
    saveKey(KEYS.genies,S.genies); render();
  };
  m.querySelectorAll('[data-gdel]').forEach(b=>b.onclick=e=>{
    e.preventDefault(); e.stopPropagation();
    const [ci,id]=b.dataset.gdel.split(':');
    const c=S.genies[+ci];
    if(confirm('Remove this link?')){ c.links=c.links.filter(l=>l.id!==id); saveKey(KEYS.genies,S.genies); render(); }
  });
}

/* =============== boot =============== */
(async ()=>{
  loadCfg();
  if(!isConfigured()){
    setSaveState('⚙ Click the gear to connect your GitHub Gist');
  }
  let loaded = null;
  if(isConfigured()){
    setSaveState('loading from Gist…');
    try{ loaded = await loadAllFromGist(); }
    catch(e){ setSaveState('✗ Could not load from Gist — check Settings'); console.error(e); }
  }
  if(loaded){
    S = {projects: loaded.projects||null, ideas: loaded.ideas||null, plan: loaded.plan||null, genies: loaded.genies||null};
  }
  seedAll();
  if(isConfigured() && !loaded){
    // first time with this gist — push the seed data up
    setSaveState('first run — saving seed data to Gist…');
    try{
      await gistSet({projects:S.projects, ideas:S.ideas, plan:S.plan, genies:S.genies});
      setSaveState('✓ saved to Gist  ' + new Date().toLocaleTimeString());
    } catch(e){ setSaveState('✗ save error — check Settings'); }
  } else if(isConfigured()){
    setSaveState('✓ loaded  ' + new Date().toLocaleTimeString());
  }
  render();
})();
</script>
